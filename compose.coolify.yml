name: zara

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zara}
      POSTGRES_USER: ${POSTGRES_USER:-zara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in Coolify}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in Coolify}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in Coolify}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in Coolify}
      RECORDINGS_BUCKET: ${RECORDINGS_BUCKET:-zara-recordings}
      ASSETS_BUCKET: ${ASSETS_BUCKET:-zara-assets}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        set -eu;
        mc alias set zara http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
        mc mb --ignore-existing "zara/$$RECORDINGS_BUCKET";
        mc mb --ignore-existing "zara/$$ASSETS_BUCKET";
        mc version enable "zara/$$RECORDINGS_BUCKET";
        mc version enable "zara/$$ASSETS_BUCKET";
        mc anonymous set none "zara/$$RECORDINGS_BUCKET";
        mc anonymous set none "zara/$$ASSETS_BUCKET";

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      ZARA_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 4010
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in Coolify}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in Coolify}
      BETTER_AUTH_URL: ${API_PUBLIC_URL:?Set API_PUBLIC_URL in Coolify}
      ZARA_TRUSTED_ORIGINS: ${ZARA_TRUSTED_ORIGINS:?Set ZARA_TRUSTED_ORIGINS in Coolify}
      ZARA_AUTH_EMAIL_WEBHOOK_URL: ${ZARA_AUTH_EMAIL_WEBHOOK_URL:?Set ZARA_AUTH_EMAIL_WEBHOOK_URL in Coolify}
      ZARA_AUTH_RATE_LIMIT_WINDOW_SECONDS: ${ZARA_AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      ZARA_AUTH_RATE_LIMIT_MAX: ${ZARA_AUTH_RATE_LIMIT_MAX:-60}
      ZARA_AUTH_RESET_TOKEN_TTL_SECONDS: ${ZARA_AUTH_RESET_TOKEN_TTL_SECONDS:-3600}
      ZARA_AUTH_VERIFICATION_TOKEN_TTL_SECONDS: ${ZARA_AUTH_VERIFICATION_TOKEN_TTL_SECONDS:-3600}
      ZARA_PLATFORM_STAFF_ROLES: ${ZARA_PLATFORM_STAFF_ROLES:-}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?Set OBJECT_STORAGE_ACCESS_KEY_ID in Coolify}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?Set OBJECT_STORAGE_SECRET_ACCESS_KEY in Coolify}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
      RECORDINGS_BUCKET: ${RECORDINGS_BUCKET:-zara-recordings}
      ASSETS_BUCKET: ${ASSETS_BUCKET:-zara-assets}
      SANDBOX_TRANSPORT_TOKEN_SECRET: ${SANDBOX_TRANSPORT_TOKEN_SECRET:-}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-zara-production}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
    expose:
      - "4010"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4010/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_BASE_URL: ${API_PUBLIC_URL:?Set API_PUBLIC_URL in Coolify}
        VITE_AUTH_BASE_URL: ${API_PUBLIC_URL:?Set API_PUBLIC_URL in Coolify}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10

  platform-admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: platform-admin
      args:
        VITE_API_BASE_URL: ${API_PUBLIC_URL:?Set API_PUBLIC_URL in Coolify}
        VITE_AUTH_BASE_URL: ${API_PUBLIC_URL:?Set API_PUBLIC_URL in Coolify}
        VITE_PLATFORM_ADMIN_ORIGIN: ${ADMIN_PUBLIC_URL:?Set ADMIN_PUBLIC_URL in Coolify}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
